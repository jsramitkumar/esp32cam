<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YOLO26s AI Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:#070a0f;color:#d1d5db}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
input[type=range]{cursor:pointer}select{cursor:pointer}

:root{
  --bg0:#070a0f;--bg1:#0d1117;--bg2:#141b24;--bg3:#1c2535;
  --border:#202840;
  --accent:#6366f1;--accent2:#818cf8;
  --live:#22c55e;--warn:#f59e0b;--danger:#ef4444;
  --text1:#f0f4ff;--text2:#94a3b8;--text3:#4b5563;
  --sidebar:268px;--topbar:50px;--detpanel:290px;
  /* task colors */
  --task-detect:#6366f1;--task-segment:#10b981;--task-pose:#f59e0b;
  --task-obb:#ef4444;--task-track:#3b82f6;--task-classify:#a855f7;
}

/* ── Layout ─────────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100vh}

/* Topbar */
#topbar{
  height:var(--topbar);flex-shrink:0;
  display:flex;align-items:center;gap:8px;padding:0 12px;
  background:var(--bg1);border-bottom:1px solid var(--border);z-index:20;
}
.logo{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;
  letter-spacing:.4px;color:var(--text1);white-space:nowrap;user-select:none}
.logo svg{color:var(--accent)}
.logo .sub{font-size:9px;font-weight:400;color:var(--accent2);letter-spacing:.8px}
.spacer{flex:1}
.tbadge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 8px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.4px;
}
#streamBadge{background:#060d1a;color:var(--text3);border:1px solid var(--border)}
#streamBadge.on{background:#052e16;color:var(--live);border-color:#14532d}
#streamBadge .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
#aiBadge{background:#1a0d2e;color:#9333ea;border:1px solid #3b0764}
#aiBadge.on{color:#a855f7}
#modelBadge{padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#taskBadge{padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700;
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  letter-spacing:.3px}
.tbtn{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  transition:background .15s,color .15s;line-height:1;white-space:nowrap;
}
.tbtn:hover{background:var(--bg2);color:var(--text1)}
.tbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tbtn.danger{background:#3f0a0a;border-color:#7f1d1d;color:#fca5a5}

/* ── Body row ──────────────────────────────────────────────── */
#body{display:flex;flex:1;overflow:hidden}

/* ── Left sidebar ─────────────────────────────────────────── */
#sidebar{
  width:var(--sidebar);flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--bg1);border-right:1px solid var(--border);overflow:hidden;
}
#camList{flex-shrink:0;overflow-y:auto;max-height:220px}
.cam-card{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .12s;
}
.cam-card:hover{background:var(--bg2)}
.cam-card.selected{background:var(--bg3);border-left:2px solid var(--accent)}
.cam-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--text3)}
.cam-dot.live{background:var(--live);box-shadow:0 0 6px var(--live)}
.cam-info{flex:1;min-width:0}
.cam-name{font-size:12px;font-weight:600;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cam-sub{font-size:10px;color:var(--text2)}
.cam-fps{font-size:10px;font-weight:700;color:var(--text2)}

#sideScroll{flex:1;overflow-y:auto;overflow-x:hidden}
.sb-section{padding:9px 12px;border-bottom:1px solid var(--border)}
.sb-title{font-size:10px;font-weight:700;color:var(--text3);
  letter-spacing:.7px;text-transform:uppercase;margin-bottom:7px;
  display:flex;align-items:center;gap:5px}
.sb-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sb-row label{font-size:11px;color:var(--text2);width:80px;flex-shrink:0}
.sb-row input[type=range]{flex:1;accent-color:var(--accent)}
.sb-row .val{font-size:10px;color:var(--text3);width:32px;text-align:right}
.sb-row select{
  flex:1;background:var(--bg3);border:1px solid var(--border);
  color:var(--text1);padding:3px 6px;border-radius:5px;font-size:11px;
}
.sb-row input[type=number]{
  width:56px;background:var(--bg3);border:1px solid var(--border);
  color:var(--text1);padding:3px 5px;border-radius:5px;font-size:11px;text-align:center;
}
.sb-row input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;cursor:pointer}
.sb-row .cb-label{font-size:11px;color:var(--text2);cursor:pointer;user-select:none}
.sb-fullbtn{
  width:100%;padding:6px 10px;border-radius:6px;font-size:11px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:6px;line-height:1;
  border:1px solid var(--border);background:var(--bg3);color:var(--text1);
  transition:background .15s;margin-top:4px;
}
.sb-fullbtn:hover{background:var(--accent);border-color:var(--accent)}
.sb-fullbtn.loading{opacity:.6;pointer-events:none}
.sb-loader{
  width:12px;height:12px;border:2px solid rgba(255,255,255,.2);
  border-top-color:var(--accent2);border-radius:50%;
  animation:spin .7s linear infinite;display:none;
}
.sb-loader.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Task buttons grid */
.task-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin-top:2px}
.task-btn{
  padding:5px 4px;border-radius:5px;font-size:10px;font-weight:700;text-align:center;
  border:1px solid var(--border);background:var(--bg3);color:var(--text2);
  transition:all .15s;letter-spacing:.2px;
}
.task-btn:hover{border-color:var(--accent);color:var(--text1)}
.task-btn.active-detect{background:rgba(99,102,241,.2);border-color:var(--task-detect);color:var(--task-detect)}
.task-btn.active-segment{background:rgba(16,185,129,.2);border-color:var(--task-segment);color:var(--task-segment)}
.task-btn.active-pose{background:rgba(245,158,11,.2);border-color:var(--task-pose);color:var(--task-pose)}
.task-btn.active-obb{background:rgba(239,68,68,.2);border-color:var(--task-obb);color:var(--task-obb)}
.task-btn.active-track{background:rgba(59,130,246,.2);border-color:var(--task-track);color:var(--task-track)}
.task-btn.active-classify{background:rgba(168,85,247,.2);border-color:var(--task-classify);color:var(--task-classify)}

/* class filter */
.cls-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:3px;
  max-height:140px;overflow-y:auto;margin-top:4px;
}
.cls-item{
  display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);
  padding:2px 3px;border-radius:3px;cursor:pointer;user-select:none;
}
.cls-item input{accent-color:var(--accent);cursor:pointer;width:11px;height:11px}
.cls-item:hover{color:var(--text1)}

/* hide sections by task */
.task-section{display:none}
.task-section.visible{display:block}

/* ── Main area ─────────────────────────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg0);position:relative}
#gridView{flex:1;display:grid;overflow:hidden;gap:3px;padding:3px;background:var(--bg0);grid-template-columns:1fr}
#gridView.c2{grid-template-columns:1fr 1fr}
#gridView.c3{grid-template-columns:1fr 1fr 1fr}
#gridView.c4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
#gridView.c5plus{grid-template-columns:repeat(3,1fr)}

.cam-cell{
  position:relative;background:#010306;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid var(--border);border-radius:4px;cursor:pointer;
}
.cam-cell.focused{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
.cam-cell canvas{width:100%;height:100%;object-fit:contain;display:block}
.cam-cell .no-sig{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  background:#020408;color:var(--text3);pointer-events:none;
}
.cam-cell .no-sig svg{width:44px;height:44px;opacity:.3}
.cam-cell .no-sig p{font-size:11px;letter-spacing:.3px}
.cam-cell .cell-overlay{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;gap:4px;padding:5px;
  background:linear-gradient(transparent,rgba(0,0,0,.75));
  opacity:0;transition:opacity .15s;pointer-events:none;
}
.cam-cell:hover .cell-overlay{opacity:1;pointer-events:auto}
.cell-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 8px;font-size:10px;font-weight:600;border-radius:4px;line-height:1;
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.12);
  color:#fff;backdrop-filter:blur(4px);
}
.cell-btn:hover{background:var(--accent)}

.ai-chip{
  position:absolute;top:7px;right:7px;
  display:flex;align-items:center;gap:4px;
  padding:3px 7px;border-radius:999px;font-size:9px;font-weight:700;
  background:rgba(99,102,241,.18);border:1px solid rgba(99,102,241,.4);
  color:#818cf8;pointer-events:none;transition:opacity .2s;
}
.ai-chip.running{background:rgba(99,102,241,.28);color:#a5b4fc}
.ai-chip svg{width:9px;height:9px}

/* Camera tabs */
#camTabs{display:flex;gap:4px;padding:4px 6px;background:var(--bg1);border-top:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.cam-tab{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  white-space:nowrap;transition:background .12s;
}
.cam-tab:hover{background:var(--bg2)}
.cam-tab.live .td{background:var(--live);box-shadow:0 0 5px var(--live)}
.cam-tab.offline .td{background:var(--text3)}
.cam-tab.focused-tab{border-color:var(--accent);color:var(--accent)}
.td{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── Right detection panel ─────────────────────────────────── */
#detPanel{
  width:var(--detpanel);flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--bg1);border-left:1px solid var(--border);overflow:hidden;
}
.det-header{
  padding:9px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
}
.det-header h2{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.6px;text-transform:uppercase}
.det-header .inf-badge{font-size:10px;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:4px;font-variant-numeric:tabular-nums}

#aiStatsBar{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;border-bottom:1px solid var(--border);flex-shrink:0}
.stat-box{padding:7px 8px;border-right:1px solid var(--border);text-align:center}
.stat-box:last-child{border-right:none}
.stat-val{font-size:15px;font-weight:700;color:var(--text1);font-variant-numeric:tabular-nums}
.stat-lbl{font-size:9px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-top:1px}

/* Results panel — shared container */
#resultsArea{flex:1;overflow-y:auto;padding:7px}

/* detection items */
.det-item{
  display:flex;align-items:center;gap:8px;
  padding:5px 8px;border-radius:5px;margin-bottom:3px;
  background:var(--bg2);border:1px solid var(--border);transition:background .1s;
}
.det-item:hover{background:var(--bg3)}
.det-color{width:4px;height:28px;border-radius:2px;flex-shrink:0}
.det-body{flex:1;min-width:0}
.det-label{font-size:12px;font-weight:600;color:var(--text1);text-transform:capitalize}
.det-conf{font-size:10px;color:var(--text2);margin-top:1px}
.det-conf-bar{height:3px;border-radius:2px;margin-top:3px;background:var(--bg3)}
.det-conf-fill{height:100%;border-radius:2px;transition:width .2s}
.det-box-info{font-size:9px;color:var(--text3);text-align:right;font-variant-numeric:tabular-nums}

/* track items */
.track-item{
  display:flex;align-items:center;gap:8px;
  padding:5px 8px;border-radius:5px;margin-bottom:3px;
  background:var(--bg2);border:1px solid var(--border);
}
.track-id-badge{
  min-width:26px;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:700;
  background:rgba(59,130,246,.25);border:1px solid rgba(59,130,246,.5);color:#93c5fd;
  text-align:center;flex-shrink:0;
}
.track-body{flex:1;min-width:0}
.track-label{font-size:11px;font-weight:600;color:var(--text1);text-transform:capitalize}
.track-conf{font-size:10px;color:var(--text2)}

/* classification items */
.cls-result-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 8px;border-radius:5px;margin-bottom:3px;
  background:var(--bg2);border:1px solid var(--border);
}
.cls-rank{font-size:11px;font-weight:700;color:var(--text3);width:16px;flex-shrink:0;text-align:center}
.cls-body{flex:1;min-width:0}
.cls-label-name{font-size:12px;font-weight:600;color:var(--text1);text-transform:capitalize}
.cls-conf-row{display:flex;align-items:center;gap:6px;margin-top:3px}
.cls-bar{flex:1;height:4px;border-radius:2px;background:var(--bg3)}
.cls-bar-fill{height:100%;border-radius:2px;background:var(--task-classify)}
.cls-pct{font-size:10px;color:var(--text3);width:32px;text-align:right;font-variant-numeric:tabular-nums}

/* pose items */
.pose-item{
  padding:6px 8px;border-radius:5px;margin-bottom:4px;
  background:var(--bg2);border:1px solid var(--border);
}
.pose-header{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.pose-label{font-size:11px;font-weight:600;color:var(--text1)}
.pose-conf{font-size:10px;color:var(--text2)}
.kp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.kp-item{
  font-size:9px;color:var(--text3);padding:2px 3px;border-radius:3px;
  background:var(--bg3);font-variant-numeric:tabular-nums;
}
.kp-item.hi{color:var(--text2)}

/* empty state */
.det-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:24px;color:var(--text3);text-align:center;
}
.det-empty svg{opacity:.3}
.det-empty p{font-size:11px;line-height:1.5}

/* event log */
#eventLog{flex-shrink:0;max-height:140px;overflow-y:auto;border-top:1px solid var(--border);padding:5px 10px}
.ev-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px}
.ev-item{display:flex;gap:7px;align-items:baseline;font-size:10px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.ev-time{color:var(--text3);flex-shrink:0;font-variant-numeric:tabular-nums}
.ev-text{color:var(--text2)}
.ev-text span{color:var(--text1);font-weight:600}

/* ── Scrollbars ──────────────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* ── Focus overlay ───────────────────────────────────────── */
#focusOverlay{display:none;position:absolute;inset:0;background:#000;z-index:10;flex-direction:column}
#focusOverlay.show{display:flex}
#focusCanvas{width:100%;height:100%;object-fit:contain}
#focusClose{
  position:absolute;top:10px;right:12px;
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;line-height:1;
  background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.15);color:#fff;
  backdrop-filter:blur(4px);z-index:11;transition:background .15s;
}
#focusClose:hover{background:rgba(255,255,255,.1)}

/* ── Mobile ───────────────────────────────────────────────── */
@media(max-width:1000px){#detPanel{display:none}}
@media(max-width:640px){
  :root{--sidebar:100vw}
  #sidebar{position:fixed;bottom:0;left:0;right:0;height:55vh;width:100vw;
    z-index:30;transform:translateY(100%);transition:transform .25s;
    border-radius:14px 14px 0 0;border-top:1px solid var(--border)}
  #sidebar.open{transform:translateY(0)}
}

/* Pulse */
@keyframes det-pulse{0%,100%{opacity:1}50%{opacity:.55}}
.det-pulse{animation:det-pulse .6s ease-in-out 2}

/* Toast */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;
  background:rgba(20,27,36,.95);border:1px solid var(--border);color:var(--text1);
  backdrop-filter:blur(8px);z-index:100;
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--live);color:var(--live)}
#toast.err{border-color:var(--danger);color:var(--danger)}
</style>
</head>
<body>
<div id="app">

<!-- ══ TOPBAR ══════════════════════════════════════════════ -->
<div id="topbar">
  <div class="logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
    <span>YOLO26s<br><span class="sub">AI DASHBOARD</span></span>
  </div>

  <div class="tbadge" id="streamBadge">
    <span class="dot"></span>Stream
  </div>
  <div class="tbadge" id="aiBadge">
    <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="9"/></svg>AI
  </div>
  <div id="modelBadge">No Model</div>
  <div id="taskBadge">DETECT</div>

  <div class="spacer"></div>

  <button class="tbtn active" id="aiToggleBtn" onclick="toggleAI()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M18.36 6.64A9 9 0 1 1 5.64 6.64"/><line x1="12" y1="2" x2="12" y2="12"/>
    </svg>AI On
  </button>
  <button class="tbtn" onclick="showGrid()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>Grid
  </button>
</div>

<!-- ══ BODY ════════════════════════════════════════════════ -->
<div id="body">

  <!-- ── Left Sidebar ── -->
  <div id="sidebar">
    <div id="camList"></div>

    <div id="sideScroll">

      <!-- ── Model ── -->
      <div class="sb-section">
        <div class="sb-title">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          AI Model
        </div>
        <div class="sb-row">
          <label>Model</label>
          <select id="modelSel"><option value="yolo26s" selected>YOLO26s</option></select>
        </div>
        <button class="sb-fullbtn" id="loadBtn" onclick="loadModel()">
          <div class="sb-loader" id="loadSpinner"></div>
          <svg id="loadIcon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
           Load Model
        </button>
        <button class="sb-fullbtn" onclick="unloadModel()" style="margin-top:3px;color:var(--text3)">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
           Unload
        </button>
      </div>

      <!-- ── Task Mode ── -->
      <div class="sb-section">

<script>
// ════════════════════════════════════════════════════════════════
// COCO 80 classes
// ════════════════════════════════════════════════════════════════
const COCO = {
  0:"person",1:"bicycle",2:"car",3:"motorcycle",4:"airplane",5:"bus",
  6:"train",7:"truck",8:"boat",9:"traffic light",10:"fire hydrant",
  11:"stop sign",12:"parking meter",13:"bench",14:"bird",15:"cat",
  16:"dog",17:"horse",18:"sheep",19:"cow",20:"elephant",21:"bear",
  22:"zebra",23:"giraffe",24:"backpack",25:"umbrella",26:"handbag",
  27:"tie",28:"suitcase",29:"frisbee",30:"skis",31:"snowboard",
  32:"sports ball",33:"kite",34:"baseball bat",35:"baseball glove",
  36:"skateboard",37:"surfboard",38:"tennis racket",39:"bottle",
  40:"wine glass",41:"cup",42:"fork",43:"knife",44:"spoon",45:"bowl",
  46:"banana",47:"apple",48:"sandwich",49:"orange",50:"broccoli",
  51:"carrot",52:"hot dog",53:"pizza",54:"donut",55:"cake",
  56:"chair",57:"couch",58:"potted plant",59:"bed",60:"dining table",
  61:"toilet",62:"tv",63:"laptop",64:"mouse",65:"remote",
  66:"keyboard",67:"cell phone",68:"microwave",69:"oven",70:"toaster",
  71:"sink",72:"refrigerator",73:"book",74:"clock",75:"vase",
  76:"scissors",77:"teddy bear",78:"hair drier",79:"toothbrush"
};

// COCO 17 pose keypoint names
const KP_NAMES = [
  "nose","left_eye","right_eye","left_ear","right_ear",
  "left_shoulder","right_shoulder","left_elbow","right_elbow",
  "left_wrist","right_wrist","left_hip","right_hip",
  "left_knee","right_knee","left_ankle","right_ankle"
];

// Pose skeleton connections [from, to]
const SKELETON = [
  [0,1],[0,2],[1,3],[2,4],
  [5,6],[5,7],[7,9],[6,8],[8,10],
  [5,11],[6,12],[11,12],
  [11,13],[13,15],[12,14],[14,16]
];

const COLORS = [
  "#6ee7b7","#fbbf24","#60a5fa","#f87171","#a78bfa","#34d399",
  "#fb923c","#38bdf8","#f472b6","#a3e635","#e879f9","#4ade80",
  "#2dd4bf","#facc15","#818cf8","#f9a8d4","#86efac","#fde68a",
  "#93c5fd","#fca5a5","#c4b5fd","#6ee7b7","#fdba74","#7dd3fc",
];
function classColor(id){ return COLORS[id % COLORS.length]; }
function hexToRgba(hex, a){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ════════════════════════════════════════════════════════════════
// State
// ════════════════════════════════════════════════════════════════
const cameras    = {};
let focusId      = null;
let selCamId     = null;
let ws           = null;
let reconn       = null;
let aiOn         = true;
let currentModel = "none";
let currentTask  = "detect";
let classFilter  = null;

// ════════════════════════════════════════════════════════════════
// Camera model
// ════════════════════════════════════════════════════════════════
class CamState {
  constructor(id){
    this.id = id; this.name = `CAM-${id}`; this.ip = "";
    this.connected = false;
    this.canvas = null; this.ctx = null;
    this.pending = null; this.rendering = false;
    this.lastResult = null;   // last raw result payload
    this.lastInfMs  = 0;
    this.aiFps = 0; this.aiDropped = 0;
    this._fpsN = 0; this._fpsT = performance.now(); this.localFps = 0;
  }
  upd(d){
    if(d.name) this.name = d.name;
    if(d.ip)   this.ip   = d.ip;
    if("connected"  in d) this.connected = d.connected;
    if("ai_fps"     in d) this.aiFps     = d.ai_fps;
    if("ai_inf_ms"  in d) this.lastInfMs = d.ai_inf_ms;
  }
  get resultCount(){
    if(!this.lastResult) return 0;
    const r = this.lastResult;
    return (r.detections||r.tracks||r.poses||r.classifications||[]).length;
  }
}

// ════════════════════════════════════════════════════════════════
// WebSocket
// ════════════════════════════════════════════════════════════════
function connect(){
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.binaryType = "arraybuffer";
  ws.onopen  = () => clearTimeout(reconn);
  ws.onclose = () => { reconn = setTimeout(connect, 1500); };
  ws.onerror = () => ws.close();
  ws.onmessage = e => typeof e.data === "string"
    ? handleText(JSON.parse(e.data))
    : handleBinary(e.data);
}
function wsSend(obj){ if(ws && ws.readyState===1) ws.send(JSON.stringify(obj)); }

// ════════════════════════════════════════════════════════════════
// Text message handling
// ════════════════════════════════════════════════════════════════
function handleText(msg){
  const t = msg.type;

  if(t === "init"){
    setStreamBadge(msg.streaming);
    setAIBadge(msg.ai_on ?? true);
    setModelBadge(msg.model || "none");
    aiOn = msg.ai_on ?? true;
    currentModel = msg.model || "none";
    if(msg.inf_cfg) applyInfCfg(msg.inf_cfg);
    if(!msg.yolo_ok) toast("⚠ ultralytics not installed – run: pip install ultralytics","err",6000);
    Object.values(msg.cameras||{}).forEach(d => ensureCam(+d.cam_id, d));
  }
  else if(t === "cam_list"){
    Object.values(msg.cameras||{}).forEach(d => ensureCam(+d.cam_id, d));
  }
  else if(t === "cam_joined" || t === "cam_status"){
    ensureCam(+msg.cam_id, msg.data||{});
  }
  else if(t === "cam_removed"){
    removeCam(+msg.cam_id);
  }
  else if(t === "stats"){
    Object.entries(msg.cameras||{}).forEach(([cid, d]) => {
      const cam = cameras[+cid]; if(!cam) return;
      cam.upd(d); updateCard(cam);
    });
  }
  else if(t === "detections"){
    const cam = cameras[+msg.cam_id]; if(!cam) return;
    cam.lastResult  = msg;
    cam.lastInfMs   = msg.inf_ms || 0;
    redrawCamOverlay(cam);
    if(focusId === cam.id || selCamId === cam.id) updateDetPanel(cam);
    updateAIChip(cam);
  }
  else if(t === "poses"){
    const cam = cameras[+msg.cam_id]; if(!cam) return;
    cam.lastResult = msg;
    cam.lastInfMs  = msg.inf_ms || 0;
    redrawCamOverlay(cam);
    if(focusId === cam.id || selCamId === cam.id) updateDetPanel(cam);
    updateAIChip(cam);
  }
  else if(t === "tracks"){
    const cam = cameras[+msg.cam_id]; if(!cam) return;
    cam.lastResult = msg;
    cam.lastInfMs  = msg.inf_ms || 0;
    redrawCamOverlay(cam);
    if(focusId === cam.id || selCamId === cam.id) updateDetPanel(cam);
    updateAIChip(cam);
  }
  else if(t === "classification"){
    const cam = cameras[+msg.cam_id]; if(!cam) return;
    cam.lastResult = msg;
    cam.lastInfMs  = msg.inf_ms || 0;
    if(focusId === cam.id || selCamId === cam.id) updateDetPanel(cam);
    updateAIChip(cam);
  }
  else if(t === "server_status"){
    setStreamBadge(msg.streaming);
    if(!msg.streaming) toast("Streaming server disconnected – reconnecting…","err");
    else toast("Streaming server connected","ok");
  }
  else if(t === "model_loading"){
    setLoadingState(true, msg.model);
    toast(`Loading ${msg.model}…`);
  }
  else if(t === "model_loaded"){
    setLoadingState(false);
    currentModel = msg.model;
    setModelBadge(msg.model);
    if(msg.success) toast(`Model loaded: ${msg.model}`,"ok");
    else toast("Failed to load model","err");
  }
  else if(t === "ai_status"){
    aiOn = msg.ai_on;
    setAIBadge(aiOn);
    const btn = document.getElementById("aiToggleBtn");
    btn.classList.toggle("active", aiOn);
    btn.childNodes[btn.childNodes.length-1].textContent = aiOn ? " AI On" : " AI Off";
  }
  else if(t === "task_changed"){
    applyTaskUI(msg.task);
  }
  else if(t === "ai_stats"){
    Object.entries(msg.cameras||{}).forEach(([cid, d]) => {
      const cam = cameras[+cid]; if(!cam) return;
      cam.aiFps    = d.fps || 0;
      cam.lastInfMs = d.inf_ms || 0;
      cam.aiDropped = d.dropped || 0;
      updateCard(cam);
    });
    if(msg.inf_cfg) applyInfCfg(msg.inf_cfg);
  }
}

// ════════════════════════════════════════════════════════════════
// Binary frame handling
// ════════════════════════════════════════════════════════════════
function handleBinary(buf){
  const a = new Uint8Array(buf); if(a.length < 3) return;
  const cam = cameras[a[0]]; if(!cam) return;
  cam._fpsN++;
  const now = performance.now();
  if(now - cam._fpsT >= 1000){
    cam.localFps = Math.round(cam._fpsN * 1000 / (now - cam._fpsT));
    cam._fpsN = 0; cam._fpsT = now;
    updateCard(cam);
  }
  renderToCanvas(cam, buf.slice(1));
}

// ════════════════════════════════════════════════════════════════
// Canvas rendering
// ════════════════════════════════════════════════════════════════
function renderToCanvas(cam, jpegBuf){
  const blob = new Blob([jpegBuf], {type:"image/jpeg"});
  const url  = URL.createObjectURL(blob);
  if(cam.rendering){ if(cam.pending) URL.revokeObjectURL(cam.pending); cam.pending=url; return; }
  _draw(cam, url);
}

function _draw(cam, url){
  cam.rendering = true;
  const img = new Image();
  img.onload = () => {
    _resizeCanvas(cam.canvas, img);
    cam.ctx.drawImage(img, 0, 0);
    _drawResultOverlay(cam.ctx, cam.lastResult);
    if(focusId === cam.id){
      const fc = document.getElementById("focusCanvas");
      _resizeCanvas(fc, img);
      const fctx = fc.getContext("2d");
      fctx.drawImage(img, 0, 0);
      _drawResultOverlay(fctx, cam.lastResult);
    }
    document.getElementById(`ns-${cam.id}`)?.style.setProperty("display","none");
    URL.revokeObjectURL(url);
    cam.rendering = false;
    if(cam.pending){ const n=cam.pending; cam.pending=null; _draw(cam,n); }
  };
  img.onerror = () => {
    URL.revokeObjectURL(url);
    cam.rendering = false;
    if(cam.pending){ const n=cam.pending; cam.pending=null; _draw(cam,n); }
  };
  img.src = url;
}

function _resizeCanvas(canvas, img){
  if(canvas.width!==img.naturalWidth||canvas.height!==img.naturalHeight){
    canvas.width=img.naturalWidth; canvas.height=img.naturalHeight;
  }
}

function redrawCamOverlay(cam){
  if(!cam.canvas) return;
  // Already drawn in _draw; for detection-only updates we just paint over:
  if(!cam.rendering && cam.canvas.width > 1){
    // Re-fetch last frame isn't possible, so we just update on next frame draw
  }
}

// ════════════════════════════════════════════════════════════════
// Master overlay dispatcher
// ════════════════════════════════════════════════════════════════
function _drawResultOverlay(ctx, result){
  if(!result) return;
  const task = result.task || currentTask;
  if(task === "detect" || task === "segment") _drawDetections(ctx, result.detections||[], task);
  else if(task === "obb")                     _drawOBBs(ctx, result.detections||[]);
  else if(task === "track")                   _drawTracks(ctx, result.tracks||[]);
  else if(task === "pose")                    _drawPoses(ctx, result.poses||[]);
  // classify: no canvas overlay
}

// ── Detection / Segmentation overlay ────────────────────────────
function _drawDetections(ctx, dets, task){
  if(!dets.length) return;
  const cw = ctx.canvas.width, ch = ctx.canvas.height;
  const fw = dets[0]?.frame_w || cw, fh = dets[0]?.frame_h || ch;
  const sx = cw/fw, sy = ch/fh;
  const sc = Math.min(cw/640, ch/480, 1.8);
  ctx.save();
  ctx.textBaseline = "middle";

  // Draw masks first (behind boxes)
  if(task === "segment"){
    for(const d of dets){
      if(!d.mask || d.mask.length < 3) continue;
      const col = classColor(d.class_id);
      ctx.fillStyle = hexToRgba(col, 0.22);
      ctx.beginPath();
      ctx.moveTo(d.mask[0][0]*sx, d.mask[0][1]*sy);
      for(let i=1;i<d.mask.length;i++) ctx.lineTo(d.mask[i][0]*sx, d.mask[i][1]*sy);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = hexToRgba(col, 0.7);
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }
  }

  for(const d of dets){
    const [x1,y1,x2,y2] = d.box;
    const bx=x1*sx, by=y1*sy, bw=(x2-x1)*sx, bh=(y2-y1)*sy;
    const col  = classColor(d.class_id);
    const pct  = Math.round(d.confidence*100);
    const lbl  = `${d.label} ${pct}%`;
    const fs   = Math.max(9, Math.round(11*sc));

    ctx.shadowColor = col; ctx.shadowBlur = 6;
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(1.5, 2*sc);
    ctx.strokeRect(bx, by, bw, bh);
    ctx.shadowBlur = 0;

    const tk = Math.min(bw, bh)*0.18;
    ctx.lineWidth = Math.max(2, 2.5*sc);
    ctx.beginPath(); ctx.moveTo(bx,by+tk); ctx.lineTo(bx,by); ctx.lineTo(bx+tk,by); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+bw-tk,by); ctx.lineTo(bx+bw,by); ctx.lineTo(bx+bw,by+tk); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx,by+bh-tk); ctx.lineTo(bx,by+bh); ctx.lineTo(bx+tk,by+bh); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+bw-tk,by+bh); ctx.lineTo(bx+bw,by+bh); ctx.lineTo(bx+bw,by+bh-tk); ctx.stroke();

    ctx.font = `600 ${fs}px 'Segoe UI',system-ui,sans-serif`;
    const tw = ctx.measureText(lbl).width;
    const ph = fs+7, pw = tw+10;
    ctx.fillStyle = hexToRgba(col, 0.88);
    _rrect(ctx, bx, by-ph-2, pw, ph, 3); ctx.fill();
    ctx.fillStyle = "#000";
    ctx.fillText(lbl, bx+5, by-ph/2-2);
  }
  ctx.restore();
}

// ── OBB overlay ─────────────────────────────────────────────────
function _drawOBBs(ctx, dets){
  if(!dets.length) return;
  const cw = ctx.canvas.width, ch = ctx.canvas.height;
  const fw = dets[0]?.frame_w||cw, fh = dets[0]?.frame_h||ch;
  const sx = cw/fw, sy = ch/fh;
  const sc = Math.min(cw/640, ch/480, 1.8);
  ctx.save();
  ctx.textBaseline = "middle";
  for(const d of dets){
    const col = classColor(d.class_id);
    const pct = Math.round(d.confidence*100);
    const corners = d.corners;
    if(!corners||corners.length<4) continue;
    ctx.shadowColor = col; ctx.shadowBlur = 5;
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(1.5, 2*sc);
    ctx.beginPath();
    ctx.moveTo(corners[0][0]*sx, corners[0][1]*sy);
    for(let i=1;i<corners.length;i++) ctx.lineTo(corners[i][0]*sx, corners[i][1]*sy);
    ctx.closePath(); ctx.stroke();
    ctx.shadowBlur = 0;
    const fs = Math.max(9, Math.round(11*sc));
    ctx.font = `600 ${fs}px 'Segoe UI',system-ui,sans-serif`;
    const lbl = `${d.label} ${pct}%`;
    const tw = ctx.measureText(lbl).width;
    const px = corners[0][0]*sx, py = corners[0][1]*sy;
    ctx.fillStyle = hexToRgba(col, 0.88);
    _rrect(ctx, px, py-fs-9, tw+10, fs+7, 3); ctx.fill();
    ctx.fillStyle = "#000"; ctx.fillText(lbl, px+5, py-fs/2-9);
  }
  ctx.restore();
}

// ── Track overlay ────────────────────────────────────────────────
function _drawTracks(ctx, tracks){
  if(!tracks.length) return;
  const cw = ctx.canvas.width, ch = ctx.canvas.height;
  const fw = tracks[0]?.frame_w||cw, fh = tracks[0]?.frame_h||ch;
  const sx = cw/fw, sy = ch/fh;
  const sc = Math.min(cw/640, ch/480, 1.8);
  ctx.save();
  ctx.textBaseline = "middle";
  for(const d of tracks){
    const [x1,y1,x2,y2] = d.box;
    const bx=x1*sx, by=y1*sy, bw=(x2-x1)*sx, bh=(y2-y1)*sy;
    // Use track_id for color so same object keeps same color
    const col = COLORS[(d.track_id >= 0 ? d.track_id : d.class_id) % COLORS.length];
    const fs  = Math.max(9, Math.round(11*sc));
    const pct = Math.round(d.confidence*100);
    const lbl = `#${d.track_id} ${d.label} ${pct}%`;

    ctx.shadowColor = col; ctx.shadowBlur = 6;
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(2, 2.5*sc);
    ctx.strokeRect(bx, by, bw, bh);
    ctx.shadowBlur = 0;

    ctx.font = `700 ${fs}px 'Segoe UI',system-ui,sans-serif`;
    const tw = ctx.measureText(lbl).width;
    const ph = fs+7, pw = tw+10;
    ctx.fillStyle = hexToRgba(col, 0.92);
    _rrect(ctx, bx, by-ph-2, pw, ph, 3); ctx.fill();
    ctx.fillStyle = "#000"; ctx.fillText(lbl, bx+5, by-ph/2-2);
  }
  ctx.restore();
}

// ── Pose overlay ─────────────────────────────────────────────────
function _drawPoses(ctx, poses){
  if(!poses.length) return;
  const cw = ctx.canvas.width, ch = ctx.canvas.height;
  const fw = poses[0]?.frame_w||cw, fh = poses[0]?.frame_h||ch;
  const sx = cw/fw, sy = ch/fh;
  const sc = Math.min(cw/640, ch/480, 1.8);
  ctx.save();
  ctx.textBaseline = "middle";
  for(const p of poses){
    const col = classColor(p.class_id);
    const [x1,y1,x2,y2] = p.box;
    const bx=x1*sx, by=y1*sy, bw=(x2-x1)*sx, bh=(y2-y1)*sy;

    // Bounding box
    ctx.shadowColor = col; ctx.shadowBlur = 4;
    ctx.strokeStyle = hexToRgba(col, 0.5); ctx.lineWidth = 1.5;
    ctx.setLineDash([4,3]);
    ctx.strokeRect(bx,by,bw,bh);
    ctx.setLineDash([]);
    ctx.shadowBlur = 0;

    const kps = p.keypoints;
    if(kps && kps.length){
      // Skeleton
      ctx.lineWidth = Math.max(1.5, 2*sc);
      for(const [a,b] of SKELETON){
        if(a >= kps.length || b >= kps.length) continue;
        const ka = kps[a], kb = kps[b];
        if(ka.conf < 0.3 || kb.conf < 0.3) continue;
        ctx.strokeStyle = hexToRgba(col, 0.7);
        ctx.beginPath();
        ctx.moveTo(ka.x*sx, ka.y*sy);
        ctx.lineTo(kb.x*sx, kb.y*sy);
        ctx.stroke();
      }
      // Keypoints
      for(const kp of kps){
        if(kp.conf < 0.3) continue;
        const r = Math.max(3, 4*sc);
        ctx.fillStyle = kp.conf > 0.7 ? col : hexToRgba(col, 0.5);
        ctx.shadowColor = col; ctx.shadowBlur = 4;
        ctx.beginPath(); ctx.arc(kp.x*sx, kp.y*sy, r, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    // Label
    const fs = Math.max(9, Math.round(11*sc));
    const pct = Math.round(p.confidence*100);
    const lbl = `${p.label} ${pct}%`;
    ctx.font = `600 ${fs}px 'Segoe UI',system-ui,sans-serif`;
    const tw = ctx.measureText(lbl).width;
    const ph = fs+7, pw = tw+10;
    ctx.fillStyle = hexToRgba(col, 0.88);
    _rrect(ctx, bx, by-ph-2, pw, ph, 3); ctx.fill();
    ctx.fillStyle = "#000"; ctx.fillText(lbl, bx+5, by-ph/2-2);
  }
  ctx.restore();
}

function _rrect(ctx, x, y, w, h, r){
  ctx.beginPath(); ctx.roundRect(x, y, w, h, r);
}

function ensureCam(id, data){
  let cam = cameras[id];
  const isNew = !cam;
  if(!cam){ cam = new CamState(id); cameras[id] = cam; }
  cam.upd(data);
  if(isNew){ buildCell(cam); buildTab(cam); addCard(cam); }
  updateCard(cam);
  if(selCamId === null) selCamId = id;
  if(focusId  === null) focusId  = id;
  reflow(); recount();
}

function removeCam(id){
  const cam = cameras[id]; if(!cam) return;
  document.getElementById(`cell-${id}`)?.remove();
  document.getElementById(`tab-${id}`)?.remove();
  document.getElementById(`scard-${id}`)?.remove();
  delete cameras[id];
  if(focusId===id)  showGrid();
  if(selCamId===id) selCamId = +Object.keys(cameras)[0] ?? null;
  reflow(); recount();
}

    <rect x="2" y="3" width="20" height="14" rx="2"/>

    <line x1="2" y1="3" x2="22" y2="17" stroke-width="2"/></svg>
    <p>${cam.name}</p>`;

function buildTab(cam){

function addCard(cam){
  const c = document.createElement("div");
  c.className = "cam-card"; c.id = `scard-${cam.id}`;
  c.onclick = () => { selCamId = cam.id; focusCam(cam.id); };

function updateCard(cam){
  const dot  = document.getElementById(`sdot-${cam.id}`);
  const name = document.getElementById(`sname-${cam.id}`);
  const sub  = document.getElementById(`ssub-${cam.id}`);
  const fps  = document.getElementById(`sfps-${cam.id}`);

function updateAIChip(cam){
  const chip = document.getElementById(`chip-${cam.id}`); if(!chip) return;
  const count = cam.resultCount;
  if(count){
    chip.classList.add("running");
    chip.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg> ${count}`;
  } else {
    chip.classList.remove("running");
    chip.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg> AI`;
  }
}

function reflow(){
  const n = Object.keys(cameras).length;
  const gv = document.getElementById("gridView");
  gv.className = "";
  if(n===2) gv.classList.add("c2");
  else if(n===3) gv.classList.add("c3");
  else if(n===4) gv.classList.add("c4");
  else if(n>=5)  gv.classList.add("c5plus");
}
function recount(){}

// ════════════════════════════════════════════════════════════════
// Detection / Results panel
// ════════════════════════════════════════════════════════════════
let _prevCount = 0;

function updateDetPanel(cam){
  if(!cam.lastResult){ return; }
  const result = cam.lastResult;
  const task   = result.task || currentTask;

  document.getElementById("infBadge").textContent   = `${cam.lastInfMs.toFixed(1)} ms`;
  document.getElementById("statFps").textContent    = cam.aiFps || "—";
  document.getElementById("statDropped").textContent= cam.aiDropped || 0;
  document.getElementById("statTask").textContent   = task.toUpperCase().slice(0,5);

  const area  = document.getElementById("resultsArea");
  const empty = document.getElementById("detEmpty");

  // ── Classification ──
  if(task === "classify"){
    const items = result.classifications || [];
    document.getElementById("statDets").textContent = items.length;
    if(!items.length){ empty.style.display=""; clearResultItems(area); return; }
    empty.style.display = "none";
    renderClassifications(area, items);
    return;
  }

  // ── Pose ──
  if(task === "pose"){
    const poses = result.poses || [];
    document.getElementById("statDets").textContent = poses.length;
    if(!poses.length){ empty.style.display=""; clearResultItems(area); return; }
    empty.style.display = "none";
    renderPoses(area, poses);
    if(poses.length !== _prevCount && poses.length > 0) addEventLog2(cam, poses.length, "person");
    _prevCount = poses.length;
    return;
  }

  // ── Track ──
  if(task === "track"){
    const tracks = result.tracks || [];
    document.getElementById("statDets").textContent = tracks.length;
    if(!tracks.length){ empty.style.display=""; clearResultItems(area); return; }
    empty.style.display = "none";
    renderTracks(area, tracks);
    return;
  }

  // ── Detect / Segment / OBB ──
  const dets = result.detections || [];
  document.getElementById("statDets").textContent = dets.length;
  if(dets.length !== _prevCount && dets.length > 0) addEventLog(cam);
  _prevCount = dets.length;
  if(!dets.length){ empty.style.display=""; clearResultItems(area); return; }
  empty.style.display = "none";
  renderDetections(area, dets, task);
}

function clearResultItems(area){
  area.querySelectorAll(".det-item,.track-item,.cls-result-item,.pose-item").forEach(e=>e.remove());
}

function renderDetections(area, dets, task){
  const existing = Array.from(area.querySelectorAll(".det-item"));
  existing.slice(dets.length).forEach(e=>e.remove());
  dets.forEach((d, i) => {
    let item = area.querySelector(`.det-item[data-i="${i}"]`);
    if(!item){
      item = document.createElement("div");
      item.className = "det-item"; item.dataset.i = i;
      item.innerHTML = `
        <div class="det-color" id="dcol-${i}"></div>
        <div class="det-body">
          <div class="det-label" id="dlbl-${i}"></div>
          <div class="det-conf"  id="dcnf-${i}"></div>
          <div class="det-conf-bar"><div class="det-conf-fill" id="dfil-${i}"></div></div>
        </div>
        <div class="det-box-info" id="dbox-${i}"></div>`;
      area.appendChild(item);
    }
    const col = classColor(d.class_id);
    const pct = Math.round(d.confidence*100);
    document.getElementById(`dcol-${i}`).style.background = col;
    document.getElementById(`dlbl-${i}`).textContent = d.label;
    document.getElementById(`dcnf-${i}`).textContent = `${pct}% · cls ${d.class_id}` + (task==="segment"&&d.mask?.length?` · ${d.mask.length}pts`:"") + (task==="obb"?` · OBB`:"");
    document.getElementById(`dfil-${i}`).style.cssText = `width:${pct}%;background:${col}`;
    if(d.box){
      const [x1,y1,x2,y2] = d.box;
      document.getElementById(`dbox-${i}`).innerHTML = `${x2-x1}×${y2-y1}<br>${x1},${y1}`;
    } else if(d.xywhr){
      const [cx,cy,w,h,r] = d.xywhr;
      document.getElementById(`dbox-${i}`).innerHTML = `${Math.round(w)}×${Math.round(h)}<br>${Math.round(r*180/Math.PI)}°`;
    }
  });
}

function renderTracks(area, tracks){
  clearResultItems(area);
  tracks.forEach(d => {
    const item = document.createElement("div");
    item.className = "track-item";
    const col = COLORS[(d.track_id>=0?d.track_id:d.class_id)%COLORS.length];
    const pct = Math.round(d.confidence*100);
    item.innerHTML = `
      <div class="track-id-badge">#${d.track_id>=0?d.track_id:"?"}</div>
      <div class="track-body">
        <div class="track-label" style="color:${col}">${d.label}</div>
        <div class="track-conf">${pct}% · cls ${d.class_id}</div>
      </div>`;
    area.appendChild(item);
  });
}

function renderClassifications(area, items){
  clearResultItems(area);
  items.forEach((c, i) => {
    const item = document.createElement("div");
    item.className = "cls-result-item";
    const pct = Math.round(c.confidence*100);
    item.innerHTML = `
      <div class="cls-rank">${i+1}</div>
      <div class="cls-body">
        <div class="cls-label-name">${c.label}</div>
        <div class="cls-conf-row">
          <div class="cls-bar"><div class="cls-bar-fill" style="width:${pct}%"></div></div>
          <span class="cls-pct">${pct}%</span>
        </div>
      </div>`;
    area.appendChild(item);
  });
}

function renderPoses(area, poses){
  clearResultItems(area);
  poses.forEach((p, pi) => {
    const item = document.createElement("div");
    item.className = "pose-item";
    const col = classColor(p.class_id);
    const pct = Math.round(p.confidence*100);
    const kps = p.keypoints || [];
    const highConf = kps.filter(k=>k.conf>=0.5);
    let kpHtml = kps.slice(0,17).map((k,i)=>{
      const hi = k.conf >= 0.5;
      return `<div class="kp-item ${hi?"hi":""}" title="${KP_NAMES[i]||"kp"+i}">${KP_NAMES[i]?KP_NAMES[i].split("_")[1]||KP_NAMES[i]:i}: ${k.conf>=0.3?Math.round(k.x)+","+Math.round(k.y):"—"}</div>`;
    }).join("");
    item.innerHTML = `
      <div class="pose-header">
        <div class="pose-label" style="color:${col}">${p.label}</div>
        <div class="pose-conf">${pct}% · ${highConf.length}/${kps.length} kps</div>
      </div>
      <div class="kp-grid">${kpHtml}</div>`;
    area.appendChild(item);
  });
}

function focusCam(id){
  focusId = id; selCamId = id;
  document.getElementById("focusOverlay").classList.add("show");
  const cam = cameras[id];
  if(cam && cam.canvas){
    const fc = document.getElementById("focusCanvas");
    _resizeCanvas(fc, cam.canvas);
    fc.getContext("2d").drawImage(cam.canvas, 0, 0);
    _drawResultOverlay(fc.getContext("2d"), cam.lastResult);
  }
  document.querySelectorAll(".cam-tab").forEach(t=>t.classList.remove("focused-tab"));
  document.getElementById(`tab-${id}`)?.classList.add("focused-tab");
  if(cam) updateDetPanel(cam);
}
function showGrid(){
  focusId = null;
  document.getElementById("focusOverlay").classList.remove("show");
  document.querySelectorAll(".cam-tab").forEach(t=>t.classList.remove("focused-tab"));
}

function setTask(task){
  wsSend({action:"set_task", task});
  applyTaskUI(task);
}

function applyTaskUI(task){
  currentTask = task;
  // update task buttons
  const tasks = ["detect","segment","pose","obb","track","classify"];
  tasks.forEach(t => {
    const btn = document.getElementById(`task-${t}`);
    if(!btn) return;
    btn.className = "task-btn" + (t===task ? ` active-${t}` : "");
  });
  // task badge
  const badge = document.getElementById("taskBadge");
  const labels = {detect:"DETECT",segment:"SEGMENT",pose:"POSE",obb:"OBB",track:"TRACK",classify:"CLASSIFY"};
  const colors = {detect:"var(--task-detect)",segment:"var(--task-segment)",pose:"var(--task-pose)",
                  obb:"var(--task-obb)",track:"var(--task-track)",classify:"var(--task-classify)"};
  badge.textContent = labels[task] || task.toUpperCase();
  badge.style.color = colors[task] || "var(--text2)";
  badge.style.borderColor = colors[task] || "var(--border)";

  // show/hide task-specific sections
  document.querySelectorAll(".task-section").forEach(el => el.classList.remove("visible"));
  const secMap = {track:"sec-track", segment:"sec-segment", classify:"sec-classify"};
  if(secMap[task]) document.getElementById(secMap[task])?.classList.add("visible");

  // hide IoU for classify
  document.getElementById("iouRow").style.display = task==="classify" ? "none" : "";
  // hide class filter for classify (model handles it)
  document.getElementById("sec-classfilter").style.display = (task==="classify"||task==="pose") ? "none" : "";

  // panel title
  const titles = {detect:"Detections",segment:"Segments",pose:"Poses",obb:"OBB Objects",track:"Tracks",classify:"Classification"};
  document.getElementById("panelTitle").textContent = titles[task] || "Results";
}

// Class filter
// ════════════════════════════════════════════════════════════════
function buildClassGrid(){
  const grid = document.getElementById("clsGrid");
  const priority = [0,1,2,3,4,5,6,7,8,14,15,16,62,63,67];
  const order = [...priority, ...Object.keys(COCO).map(Number).filter(k=>!priority.includes(k))];
  order.forEach(id => {
    const item = document.createElement("label");
    item.className = "cls-item";
    const cb = document.createElement("input");
    cb.type="checkbox"; cb.checked=true; cb.dataset.cls=id;
    cb.onchange = applyClassFilter;
    item.appendChild(cb);
    const span = document.createElement("span");
    span.textContent = COCO[id] || `cls-${id}`;
    item.appendChild(span);
    grid.appendChild(item);
  });
}
function toggleAllClasses(state){
  document.querySelectorAll("#clsGrid input").forEach(cb=>cb.checked=state);
  applyClassFilter();
}
function applyClassFilter(){
  const checked = Array.from(document.querySelectorAll("#clsGrid input:checked")).map(cb=>+cb.dataset.cls);
  const all = checked.length === Object.keys(COCO).length;
  classFilter = all ? null : checked;
  wsSend({action:"set_classes", classes:classFilter});
}

// ════════════════════════════════════════════════════════════════
// Badge helpers
// ════════════════════════════════════════════════════════════════
function setStreamBadge(on){
  const b = document.getElementById("streamBadge");
  b.classList.toggle("on", on);
}
function setAIBadge(on){
  document.getElementById("aiBadge").classList.toggle("on", on);
}
function setModelBadge(name){
  const b = document.getElementById("modelBadge");
  b.textContent = name==="none" ? "No Model" : `⬡ ${name}`;
  b.style.color = name==="none" ? "var(--text3)" : "var(--accent2)";
}
function setLoadingState(loading, name){
  const btn     = document.getElementById("loadBtn");
  const spinner = document.getElementById("loadSpinner");
  const icon    = document.getElementById("loadIcon");
  btn.classList.toggle("loading", loading);
  spinner.classList.toggle("show", loading);
  icon.style.display = loading ? "none" : "";
  btn.childNodes[btn.childNodes.length-1].textContent = loading ? ` Loading ${name}…` : " Load Model";
}

// ════════════════════════════════════════════════════════════════
// Event log
// ════════════════════════════════════════════════════════════════
function pad2(n){ return String(n).padStart(2,"0"); }
function _ts(){ const t=new Date(); return `${pad2(t.getHours())}:${pad2(t.getMinutes())}:${pad2(t.getSeconds())}`; }

function addEventLog(cam){
  const dets = (cam.lastResult?.detections)||[];
  if(!dets.length) return;
  const labels = [...new Set(dets.map(d=>d.label))];
  const log = document.getElementById("evItems");
  const item = document.createElement("div"); item.className="ev-item";
  item.innerHTML = `<span class="ev-time">${_ts()}</span>
    <span class="ev-text"><span>${cam.name}</span> detected ${labels.slice(0,3).join(", ")}${labels.length>3?" +more":""}</span>`;
  log.prepend(item);
  Array.from(log.children).slice(30).forEach(e=>e.remove());
}
function addEventLog2(cam, count, label){
  const log = document.getElementById("evItems");
  const item = document.createElement("div"); item.className="ev-item";
  item.innerHTML = `<span class="ev-time">${_ts()}</span>
    <span class="ev-text"><span>${cam.name}</span> pose: ${count} ${label}${count!==1?"s":""}</span>`;
  log.prepend(item);
  Array.from(log.children).slice(30).forEach(e=>e.remove());
}

// ════════════════════════════════════════════════════════════════
// Toast
// ════════════════════════════════════════════════════════════════
let _toastTimer;
function toast(msg, kind, dur=2800){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "show" + (kind ? ` ${kind}` : "");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>el.className="", dur);
}

// ════════════════════════════════════════════════════════════════
buildClassGrid();
connect();
setInterval(()=>wsSend({action:"get_stats"}), 3000);
